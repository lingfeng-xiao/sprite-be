spring:
  application:
    name: sprite

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

sprite:
  cognition:
    enabled: true
    interval-ms: 1000
  evolution:
    enabled: true
    interval-ms: 600000
    min-feedback-for-evolution: 3
  llm:
    enabled: false
    minmax:
      api-key: ${MINMAX_API_KEY:default-key}
      base-url: https://api.minimax.chat
  owner:
    name: 灵锋
    occupation: 软件工程师
    workplace: 办公室
    home: 家里

logging:
  level:
    com.lingfeng.sprite: DEBUG
    com.github.oshi: INFO
