services:
  sprite-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sprite-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/sprite?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=sprite_user
      - SPRING_DATASOURCE_PASSWORD=${SPRITE_DB_PASSWORD:-sprite_secret}
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_FLYWAY_ENABLED=true
      - SPRING_SQL_INIT_MODE=never
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - MINMAX_API_KEY=${MINMAX_API_KEY:-}
      - SPRITE_LLM_ENABLED=${SPRITE_LLM_ENABLED:-true}
      - SPRITE_OWNER_NAME=${OWNER_NAME:-owner}
      - SPRITE_OWNER_OCCUPATION=${OWNER_OCCUPATION:-builder}
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:+UseG1GC
      - LOGGING_LEVEL_ROOT=INFO
      - LOGGING_LEVEL_COM_LINGFENG_SPRITE=DEBUG
    volumes:
      - ./deploy/config:/app/config:ro
      - ./deploy/data:/app/data
      - ./deploy/logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - sprite-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  mysql:
    image: mysql:8.0.39
    container_name: sprite-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=sprite
      - MYSQL_USER=sprite_user
      - MYSQL_PASSWORD=${SPRITE_DB_PASSWORD:-sprite_secret}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_secret}
    volumes:
      - ./deploy/mysql-data:/var/lib/mysql
    networks:
      - sprite-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  sprite-network:
    driver: bridge
    name: sprite-network
