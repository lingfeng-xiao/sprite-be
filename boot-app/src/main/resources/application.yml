spring:
  application:
    name: digital-beings-java
  profiles:
    default: memory
management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
digital-beings:
  program:
    phase: stage-7
    status-document: docs/PROGRAM-STATUS.md
  jobs:
    heartbeat-enabled: false
    status-heartbeat-delay-ms: 1800000
